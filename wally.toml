[package]
name = "thefnox/lyra"
description = "Fork of 010devx101's Lyra fork. Making it possible to run tests in rocale-cli."
version = "0.6.3"
license = "MIT"
authors = ["nomer888", "outofbears"]
realm = "shared"
registry = "https://github.com/UpliftGames/wally-index"
homepage = "https://paradoxum-games.github.io/lyra/"
repository = "https://github.com/thefnox/lyra"
exclude = ["*"]
include = [
	"src",
	"src/**/*",
	"wally.lock",
	"wally.toml",
	"LICENSE",
	"default.project.json",
]

[dependencies]
Promise = "evaera/promise@4.0.0"
GreenTea = "corecii/greentea@0.4.11"

[dev-dependencies]
Jest = "jsdotlua/jest@3.10.0"
JestGlobals = "jsdotlua/jest-globals@3.10.0"
